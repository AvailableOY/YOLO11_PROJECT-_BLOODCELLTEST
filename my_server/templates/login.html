<!DOCTYPE html>
<html lang="en">

<head>
    <!-- 网站图标 -->
    <link rel="shortcut icon" href="../static/favicon/favicon_chat.png" type="image/png">
    <!-- 引入样式 -->
    <link rel="stylesheet" href="../static/element-ui/lib/theme-chalk/index.css">
    <meta charset="UTF-8">
    <title>Login Page</title>
    <script src="../static/js/vue.js" type="text/javascript"></script>
    <!-- 引入组件库 -->
    <script src="../static/element-ui/lib/index.js"></script>
    <!-- 引入Axios -->
    <script src="../static/axios/dist/axios.js" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* 添加背景图片 */
            background-image: url('../static/UI/01.png');
            background-size: cover;
            /* 图片铺满整个屏幕 */
            background-position: center;
            /* 居中显示 */
            background-repeat: no-repeat;
            /* 不重复 */
        }

        #app {
            width: 100%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.7);
            /* 半透明白色背景，提升可读性 */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .el-form-item {
            margin-bottom: 20px;
        }

        .el-input {
            border-radius: 5px;
        }

        .el-button {
            width: 100%;
            border-radius: 5px;
        }

        .el-form-item label {
            font-weight: bold;
        }

        h2 {
            text-align: center;
            font-size: 24px;
        }

        .el-form {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <!--为vue.js的对象创建一个容器只有在这个容器中才可以使用vue.js对象中的内容，不在容器中无效-->
    <div id="app">
        <h2>用户登录</h2>
        <el-form :model="user" :rules="rules" ref="ruleForm" label-width="100px" class="demo-ruleForm">
            <el-row>
                <el-col :span="24">
                    <el-form-item label="账号" prop="username">
                        <el-input v-model="user.username" placeholder="Enter your username"></el-input>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-form-item label="密码" prop="password">
                <el-input v-model="user.password" placeholder="Enter your password" type="password"></el-input>
            </el-form-item>
            <el-form-item>
                <el-button type="primary" @click="login('ruleForm')">登录</el-button>
            </el-form-item>
        </el-form>
    </div>

    <script>
        new Vue({
            // el 绑定属性 绑定作用域
            el: '#app',
            // 修改vue的取值方式，默认{{key}} 修改为 [[ ]]  因为默认值和 html的取值方式render冲突
            delimiters: ['[[', ']]'],  // ✅ 改成 [[ ]]，避免和 Django 冲突
            // data 定义变量
            data() {
                return {
                    serverURL: "http://127.0.0.1:8777/",
                    user: {
                        username: '欧阳李强',
                        password: '111'
                    },
                    rules: {
                        username: [
                            { required: true, message: '请输入账号', trigger: 'blur' },
                            { min: 3, max: 5, message: '长度在 3 到 5 个字符', trigger: 'blur' }
                        ],
                        password: [
                            { required: true, message: '请输入密码', trigger: 'blur' },
                            { min: 3, max: 5, message: '长度在 3 到 5 个字符', trigger: 'blur' }
                        ]
                    }
                };
            },
            methods: {
                login(formName) {
                    let _this = this;
                    // 表单认证
                    this.$refs[formName].validate((valid) => {
                        // valid 的值是一个布尔值，如果通过为 true，否则为 false
                        if (valid) {
                            // 发送请求,访问服务器的登录方法 post请求 json数据
                            axios({
                                url: this.serverURL + "login/",
                                method: "post",
                                data: JSON.stringify(_this.user), //把json对象转换成字符串
                                headers: {
                                    'Content-Type': 'application/json;charset=UTF-8' //设置请求头
                                }
                            }).then(res => {  //当客户端接收到服务器的响应时执行   用箭头函数规避作用域的问题
                                console.log(_this.user.username)
                                let status = res.data.status
                                let msg = res.data.msg
                                if (status === 200) {
                                    this.$message.success(msg);
                                    // 把当前登录的username保存到sessionStorage中
                                    // sessionStorage 本地存储 一次会话就会消失
                                    // 存值键值对，取值通过键
                                    sessionStorage.setItem("username", _this.user.username);
                                    // 延迟一秒跳转
                                    setTimeout(() => {
                                        window.location.href = this.serverURL + "goIndex/";  //跳转到index.html页面
                                    }, 1000);
                                } else {
                                    this.$message.error(msg);
                                }
                            }).catch(error => {   //出现500错误时执行
                                console.log("登录失败")
                                _this.$message.error("登录失败，请检查用户名或密码是否正确")
                            });
                        } else {
                            console.log('error submit!!');
                            return false;
                        }
                    });
                },
                resetForm(formName) {
                    this.$refs[formName].resetFields();
                }
            },
            mounted() {
                // 页面加载完毕后执行
                console.log("页面加载完毕");
            }
        });
    </script>
</body>

</html>
