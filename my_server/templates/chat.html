<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能问诊助手</title>
    <link rel="shortcut icon" href="../static/favicon/favicon_chat.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/build/highlight.min.js"></script>

    <style>
        /* 全局重置与基础样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center; /* 居中显示 */
        }

        /* 优化滚动条样式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* 主容器使用 Flex 布局 */
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px;
            height: 100vh;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 聊天记录区域自适应撑开 */
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .user-wrapper { align-self: flex-end; }
        .ai-wrapper { align-self: flex-start; }

        .message {
            padding: 12px 18px;
            border-radius: 12px;
            line-height: 1.6;
            word-break: break-word;
            font-size: 15px;
        }

        .user-message {
            background-color: #1890ff;
            color: white;
            border-bottom-right-radius: 2px;
            box-shadow: 0 2px 6px rgba(24,144,255,0.2);
        }

        .ai-message {
            background-color: #f6f8fa;
            color: #333;
            border: 1px solid #e1e4e8;
            border-bottom-left-radius: 2px;
        }

        /* 加载动画样式 */
        .typing-indicator {
            color: #888;
            font-size: 14px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        /* 底部输入框区域 */
        .chat-input-container {
            padding: 16px 24px;
            background-color: #fff;
            border-top: 1px solid #ebedf0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input-container input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #d9d9d9;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .chat-input-container input:focus {
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }

        .chat-input-container input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .chat-input-container button {
            padding: 12px 28px;
            background-color: #1890ff;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .chat-input-container button:hover:not(:disabled) {
            background-color: #40a9ff;
        }

        .chat-input-container button:disabled {
            background-color: #bae0ff;
            cursor: not-allowed;
        }

        /* 保持原有的 Markdown 样式... */
        .markdown-body { font-size: 15px; }
        .markdown-body pre { background: #282c34; color: #abb2bf; padding: 16px; border-radius: 8px; overflow-x: auto;}
        .markdown-body code { font-family: 'Consolas', monospace; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body p:first-child { margin-top: 0; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        .markdown-body th, .markdown-body td { border: 1px solid #d0d7de; padding: 8px; }
        .markdown-body img {
            max-width: 100%; /* 图片宽度绝不超过聊天气泡的宽度 */
            height: auto;
            border-radius: 8px; /* 给图片加上好看的圆角 */
            margin: 10px 0; /* 图片上下留出一点间距 */
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); /* 加一点淡淡的阴影显得更高级 */
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="chat-messages" ref="messages">
            <div v-for="msg in messages" :key="msg.id" 
                 :class="['message-wrapper', msg.sender === 'user' ? 'user-wrapper' : 'ai-wrapper']">
                
                <div :class="['message', msg.sender === 'user' ? 'user-message' : 'ai-message']">
                    <div v-if="msg.sender === 'ai' && msg.isThinking" class="typing-indicator">
                        AI 正在分析中
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                    <div v-else-if="msg.sender === 'ai'" class="markdown-body" v-html="renderMarkdown(msg.text)"></div>
                    <div v-else>[[ msg.text ]]</div>
                </div>

            </div>
        </div>

        <div class="chat-input-container">
            <input type="text" 
                   v-model="inputText" 
                   @keyup.enter="sendMessage" 
                   :disabled="isSending"
                   placeholder="输入与血细胞检测或病理相关的诊断问题..." 
                   ref="inputBox" />
            <button @click="sendMessage" :disabled="isSending || !inputText.trim()">
                [[ isSending ? '发送中...' : '发 送' ]]
            </button>
        </div>
    </div>

    <script>
        new Vue({
            delimiters: ["[[", "]]"],
            el: '#app',
            data() {
                return {
                    inputText: '',
                    isSending: false, // 保护状态：防止重复点击
                    userName: sessionStorage.getItem("username") || "Doctor",
                    serverURL: 'http://127.0.0.1:8777/',
                    messages: [
                        { id: 1, sender: 'ai', text: '您好！我是血细胞智能辅助分析助手。请问关于检测报告您有什么疑问？', isThinking: false }
                    ],
                };
            },
            methods: {
                renderMarkdown(text) {
                    if (!text) return '';
                    try {
                        let rendered = marked.parse(text);
                        rendered = DOMPurify.sanitize(rendered);
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = rendered;
                        tempDiv.querySelectorAll('pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                        return tempDiv.innerHTML;
                    } catch (e) {
                        console.error('Markdown 渲染错误:', e);
                        return text;
                    }
                },
                
                async sendMessage() {
                    if (!this.inputText.trim() || this.isSending) return;
                    
                    const userInput = this.inputText;
                    this.inputText = '';
                    this.isSending = true;

                    // 1. 追加用户消息
                    this.messages.push({
                        id: Date.now(),
                        sender: 'user',
                        text: userInput
                    });
                    this.scrollToBottom();

                    // 2. 预先追加 AI 消息占位符
                    const currentAiId = Date.now() + 1;
                    const aiMsg = {
                        id: currentAiId,
                        sender: 'ai',
                        text: '',
                        isThinking: true // 开启加载动画
                    };
                    this.messages.push(aiMsg);
                    this.scrollToBottom();

                    try {
                        const response = await fetch(this.serverURL + "aichat/chatModel/", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                sender: this.userName,
                                question: userInput
                            })
                        });

                        if (!response.ok) throw new Error("网络响应异常");

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder("utf-8");
                        let buffer = "";

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;

                            // 收到第一个字时，关闭思考状态
                            if (aiMsg.isThinking) aiMsg.isThinking = false;

                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split("\n\n");
                            buffer = lines.pop(); 

                            for (const line of lines) {
                                if (line.startsWith("data: ")) {
                                    const dataStr = line.slice(6);
                                    if (dataStr.trim() === "[DONE]") {
                                        break;
                                    }
                                    try {
                                        const data = JSON.parse(dataStr);
                                        aiMsg.text += data.content || "";
                                        this.scrollToBottom();
                                    } catch (e) {
                                        console.warn("解析流片段失败，跳过:", e);
                                    }
                                }
                            }
                        }
                    } catch (error) {
                        console.error("请求大模型失败:", error);
                        // 修正了原来的 thinkingId 报错
                        const errorMsg = this.messages.find(m => m.id === currentAiId);
                        if (errorMsg) {
                            errorMsg.isThinking = false;
                            errorMsg.text = "⚠️ 抱歉，网络或服务器发生异常，无法连接到 AI 模型。";
                        }
                    } finally {
                        this.isSending = false;
                        this.scrollToBottom();
                        // 焦点自动回到输入框，方便连续提问
                        this.$nextTick(() => {
                            this.$refs.inputBox.focus();
                        });
                    }
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const el = this.$refs.messages;
                        if(el) {
                            el.scrollTop = el.scrollHeight;
                        }
                    });
                }
            },
            mounted() {
                this.scrollToBottom();
            }
        });
    </script>
</body>
</html>
