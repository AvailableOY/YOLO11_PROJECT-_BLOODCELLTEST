<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>图片检测</title>
  <link rel="stylesheet" href="../static/element-ui/lib/theme-chalk/index.css">
  <script src="../static/js/vue.js"></script>
  <script src="../static/element-ui/lib/index.js"></script>
  <script src="../static/axios/dist/axios.js" type="text/javascript"></script>
  <script src="../static/js/echarts-5.3.3.js"></script>

  <style>
    body {
      background-color: #f5f7fa;
      font-family: "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }

    #app {
      display: flex;
      gap: 24px;
      max-width: 1200px;
      /* 稍微加宽一点，方便横向放多张图 */
      width: 100%;
      padding: 20px;
      justify-content: center;
    }

    #bar {
      width: 100%;
      height: 100%;
    }

    .card-container,
    .chart-container {
      flex: 1;
      min-width: 320px;
      max-width: 650px;
      padding: 30px 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border-radius: 16px;
      background: #fff;
      min-height: 400px;
    }

    .title {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 25px;
      color: #409EFF;
      letter-spacing: 1px;
    }

    .upload-demo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    /* === 修改了图片预览区域的样式，支持多图横向排列 === */
    .img-preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 15px;
    }

    .img-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid #ebeef5;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .img-card img {
      border-radius: 6px;
      object-fit: cover;
      height: 200px;
      /* 稍微缩小一点，省空间 */
      width: 200px;
    }

    .file-name {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
      text-align: center;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="card-container">
      <div class="title">图片批量检测系统</div>

      <el-upload class="upload-demo" ref="upload" action :auto-upload="false" :file-list="fileList"
        :show-file-list="false" :on-change="handleChange" multiple>
        <el-button slot="trigger" size="small" type="primary">选择多张图片</el-button>
        <el-button style="margin-left: 10px;" size="small" type="success" @click="detectImg"
          :loading="loading">执行批量检测</el-button>
      </el-upload>

      <div class="img-preview-container">
        <div class="img-card" v-for="(item, index) in previewList" :key="index">
          <div style="display: flex; gap: 10px;">
            <div>
              <img :src="item.sourceUrl" alt="原图预览">
              <div class="file-name" :title="item.name">{{ item.name }}</div>
            </div>
            <div v-if="item.resultUrl">
              <img :src="item.resultUrl" alt="检测结果">
              <div class="file-name" style="color: #67C23A; font-weight: bold;">检测完成</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="chart-container">
      <h3 style="text-align: center; margin-bottom: 12px; color: #555;">检测统计 (总量)</h3>
      <div id="bar"></div>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          serverURL: "http://127.0.0.1:8777/",
          fileList: [],
          previewList: [], // 💡 新增：专门用来存图片的预览信息和结果 URL
          loading: false,  // 改成了普通的布尔值，绑定到按钮的 :loading 属性上体验更好
        };
      },
      methods: {
        handleChange(file, fileList) {
          // 💡 直接接收整个多选后的文件列表，不再清空
          this.fileList = fileList;
          this.showImg();
        },
        showImg() {
          // 💡 优化：使用 URL.createObjectURL 同步瞬间生成所有图片的预览链接
          this.previewList = this.fileList.map(f => {
            return {
              name: f.name,
              sourceUrl: URL.createObjectURL(f.raw), // 原图 Base64 预览
              resultUrl: '' // 刚选的图片，结果 URL 暂时为空
            };
          });
        },
        detectImg() {
          if (!this.fileList.length) {
            this.$message.warning("请先选择图片！");
            return;
          }

          this.loading = true;
          let formData = new FormData();

          // 💡 核心修改：循环把所有选中的图片塞进 FormData
          // 这里的 "files" 是后端将要接收的参数名，后端必须改成接收 List[UploadFile]
          this.fileList.forEach(item => {
            formData.append("files", item.raw);
          });

          formData.append("username", sessionStorage.getItem("username"));

          axios({
            url: this.serverURL + "detectImg/", // 接口名建议后端也加上 Batch 表示批量
            method: "post",
            data: formData,
            headers: { "Content-Type": "multipart/form-data" }
          }).then(res => {
            this.loading = false;

            let allData = res.data.data.all_data;

            // 💡 准备一个变量来记录我们要弹窗显示的内容
            let summaryHtml = '<div style="max-height: 300px; overflow-y: auto;">';

            allData.forEach((item, index) => {
              if (this.previewList[index]) {
                this.$set(this.previewList[index], 'resultUrl', this.serverURL + item.result_url);
                this.$set(this.previewList[index], 'details', item.details);
                this.$set(this.previewList[index], 'conf', item.conf);

                // 💡 把每张图的结果累加到弹窗内容里
                summaryHtml += `<p><b>图片 ${index + 1} (${item.filename}):</b><br/>`;
                summaryHtml += `检测到: ${JSON.stringify(item.details)}<br/>`;
                summaryHtml += `平均置信度: ${item.conf}</p><hr/>`;
              }
            });
            summaryHtml += '</div>';

            // ✅ 关键点：把这个弹窗函数加回来！
            this.$alert(summaryHtml, '批量检测报告', {
              dangerouslyUseHTMLString: true, // 允许弹窗里显示 HTML 格式
              confirmButtonText: '查看图表',
              callback: action => {
                this.loadBar(); // 弹窗关闭后刷新下方柱状图
              }
            });

            this.$message.success(res.data.msg);
          }).catch(error => {
            this.loading = false;
            console.log(error);
            this.$message.error("图片批量检测失败！");
          });
        },
        loadBar() {
          let _this = this;
          let myChart = echarts.init(document.getElementById('bar'));
          axios({
            url: this.serverURL + "LoadCurrentBar/",
            method: "get"
          }).then(res => {
            let option = {
              xAxis: {
                type: 'category',
                data: res.data.data.xData,
                axisLabel: {
                  show: true,
                  interval: 0,
                  rotate: 30,
                  fontSize: 12,
                  margin: 8
                },
                axisTick: { alignWithLabel: true }
              },
              yAxis: { type: 'value' },
              series: [{ data: res.data.data.yData, type: 'bar' }]
            };
            myChart.setOption(option);
            window.addEventListener('resize', function () {
              myChart.resize();
            });
          }).catch(error => {
            console.log(error);
            this.$message.error("柱状图加载失败！");
          })
        },
      },
      mounted() {
        // this.loadBar();
      }
    });
  </script>
</body>

</html>
